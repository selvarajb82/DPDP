services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      N8N_PAYMENT_WEBHOOK_URL: ${N8N_PAYMENT_WEBHOOK_URL:-}
      N8N_REPORT_WEBHOOK_URL: ${N8N_REPORT_WEBHOOK_URL:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      FLASK_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://dpdp.vtogether.tech}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://dpdp.vtogether.tech}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - traefik
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      N8N_PAYMENT_WEBHOOK_URL: ${N8N_PAYMENT_WEBHOOK_URL:-}
      N8N_REPORT_WEBHOOK_URL: ${N8N_REPORT_WEBHOOK_URL:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      FLASK_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://dpdp.vtogether.tech}
    labels:
      - traefik.enable=true
      - traefik.http.routers.dpdp-backend.rule=Host(`dpdp.vtogether.tech`) && PathPrefix(`/api`)
      - traefik.http.routers.dpdp-backend.tls=true
      - traefik.http.routers.dpdp-backend.entrypoints=web,websecure
      - traefik.http.routers.dpdp-backend.tls.certresolver=mytlschallenge
      - traefik.http.services.dpdp-backend.loadbalancer.server.port=5000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://dpdp.vtogether.tech}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.dpdp-frontend.rule=Host(`dpdp.vtogether.tech`)
      - traefik.http.routers.dpdp-frontend.tls=true
      - traefik.http.routers.dpdp-frontend.entrypoints=web,websecure
      - traefik.http.routers.dpdp-frontend.tls.certresolver=mytlschallenge
      - traefik.http.services.dpdp-frontend.loadbalancer.server.port=80

networks:
  traefik:
    external: true
    name: n8n_default
